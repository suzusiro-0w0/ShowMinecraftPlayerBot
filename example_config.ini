# Discord関連の設定値
[discord]
# Discordボットのトークン
bot_token = YOUR_DISCORD_BOT_TOKEN
# ステータス兼コマンドチャンネルのID
status_command_channel_id = 123456789012345678
# 管理者通知を送信するチャンネルID
admin_channel_id = 123456789012345678
# コマンド実行メッセージを削除するまでの待機秒数
delete_delay_seconds = 30.0

# サーバー制御に関する設定値
[server]
# 使用するプラットフォーム（現状はwindowsのみ対応）
platform = windows
# WinSW実行ファイルのパス
winsw_path = C:\\path\\to\\winsw.exe
# WinSWで管理しているサービス名
service_name = MinecraftService
# Minecraftサーバーのアドレス（ポート付き）
server_address = localhost:25565
# サーバー状態をポーリングする間隔（秒）
status_poll_interval = 5.0
# ステータスメッセージを更新する間隔（秒）
status_message_interval = 60.0
# 起動・停止・再起動の完了を待つタイムアウト（秒）
operation_timeout_seconds = 300.0

# 永続化に関する設定値
[persistence]
# ステータスメッセージ情報を保存するJSONファイルパス
status_store_path = data/status_message.json

# チャンネルクリーンアップに関する設定値
[cleanup]
# ステータスチャンネルを巡回する間隔（秒）
channel_cleanup_interval = 60.0
# 1回の巡回で削除する最大メッセージ数
max_delete_per_cycle = 20
# メッセージ削除ごとに待機する秒数（レート制限対策）
delete_spacing_seconds = 1.0
