# このファイルは設定テンプレートです
# 詳細な設定手順は docs/configuration_guide.md を参照してください

# Discord Botの設定値をまとめたセクション
[discord]
# Botのアクセストークンを記載してください
TOKEN = Your Discord Bot Token Here
# サーバー状況メッセージを表示するテキストチャンネルIDを記載してください
STATUS_CHANNEL_ID = 000000000000000000
# エラー通知を受け取るチャンネルIDを記載してください
ERROR_CHANNEL_ID = 000000000000000000
# サーバー操作コマンドを実行できる管理者ロールIDを記載してください
ADMIN_ROLE_ID = 000000000000000000

# Minecraftサーバーの接続設定をまとめたセクション
[server]
# RCON接続に使用するホスト名を記載してください
RCON_HOST = localhost
# RCONポート番号を記載してください
RCON_PORT = 25575
# RCONパスワードを記載してください
RCON_PASSWORD = password
# サーバー状態を更新する間隔（秒）を指定してください
STATUS_INTERVAL = 30

# サーバー制御に利用する外部コマンドの設定をまとめたセクション
[commands]
# Windowsで !start_server 実行時に使うサーバー起動コマンドを指定してください
START_SCRIPT_WINDOWS = C:\MinecraftServer\run.bat
# Linuxで !start_server 実行時に使うサーバー起動コマンドを指定してください
START_SCRIPT_LINUX = /opt/minecraft/run.sh
# Dockerコンテナ内で !start_server 実行時に使うサーバー起動コマンドを指定してください
START_SCRIPT_DOCKER = /app/server/run.sh
# 旧設定キーです。未移行環境向けの後方互換としてのみ利用されます
START_SCRIPT =
# さらに旧い設定キーです。START_SCRIPT へ移行できない場合のみ利用してください
START_COMMAND =
# Docker Composeで同一ネットワーク内のMinecraftサービスを直接起動/停止する場合は true を指定してください
DOCKER_COMPOSE_CONTROL_ENABLED = false
# Docker Compose制御で対象となるMinecraftサーバーサービス名を指定してください
DOCKER_COMPOSE_SERVICE_NAME = minecraft
# Docker Composeコマンドを実行するプロジェクトディレクトリを指定してください（空欄時はBotのカレントディレクトリ）
DOCKER_COMPOSE_PROJECT_DIR =
# Docker Composeで対象Stackを識別するプロジェクト名を指定してください（例: mcserver-stack）
DOCKER_COMPOSE_PROJECT_NAME =
# サーバー停止はRCON経由で実行されるため、外部停止コマンドの設定は不要です
# サーバーを再起動するコマンドまたはスクリプトを指定してください（未設定の場合は停止→起動を順に実行します）
RESTART_COMMAND =
# 外部コマンドのタイムアウト秒数を指定してください
COMMAND_TIMEOUT = 60
# サーバー操作完了を確認する再試行回数を指定してください
OPERATION_RETRY_ATTEMPTS = 3
# 各再試行の待機秒数を指定してください
OPERATION_RETRY_INTERVAL = 10

# ログ出力設定をまとめたセクション
[logging]
# Pythonのloggingモジュールに適用するログレベルを記載してください（例: INFO, DEBUG）
LEVEL = INFO
