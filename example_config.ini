# ============================================================
# ShowMinecraftPlayerBot 設定ファイル（サンプル）
#
# このファイルは「見本」です。
# 実運用では /opt/showmc/config.ini にコピーして使ってください。
# ============================================================

# ============================================================
# 1) Discord接続設定（最優先で設定）
# ============================================================
[discord]
# Botトークン（必須）
TOKEN = Your Discord Bot Token Here
# サーバー状況メッセージを表示するチャンネルID
STATUS_CHANNEL_ID = 000000000000000000
# エラー通知を受け取るチャンネルID
ERROR_CHANNEL_ID = 000000000000000000
# 従来のテキストコマンドに使う管理者ロールID
ADMIN_ROLE_ID = 000000000000000000

# ============================================================
# 2) Minecraft状態監視設定（必要に応じて調整）
# ============================================================
[server]
# RCON接続先ホスト
RCON_HOST = localhost
# RCONポート
RCON_PORT = 25575
# RCONパスワード
RCON_PASSWORD = password
# 状態更新間隔（秒）
STATUS_INTERVAL = 30
# 無人時の自動停止を有効化するか（True/False）
AUTO_STOP_ENABLED = False
# 無人状態がこの時間（時間）を超えたら停止対象（既定:48）
AUTO_STOP_HOURS = 48

# ============================================================
# 3) 従来コマンド用の外部コマンド設定（必要時のみ）
# ============================================================
[commands]
# 起動コマンドまたは起動スクリプト（絶対パス推奨）
START_COMMAND = C:\\MinecraftServer\\run.bat
# 停止はRCON経由のため、停止コマンドは不要
# 再起動コマンド（空欄なら「停止→起動」を実行）
RESTART_COMMAND =
# 外部コマンドのタイムアウト（秒）
COMMAND_TIMEOUT = 60
# 操作完了確認の再試行回数
OPERATION_RETRY_ATTEMPTS = 3
# 再試行間隔（秒）
OPERATION_RETRY_INTERVAL = 10

# ============================================================
# 4) /mc コマンド設定（Docker運用ではここが最重要）
# ============================================================
[minecraft_control]
# 上位制御モード（docker / local）
MC_CONTROL_MODE = docker

# --------------------
# dockerモード設定
# --------------------
# 制御モード（compose / container）
# 初期運用は container を推奨
MC_MODE = container
# composeモード時: プロジェクトディレクトリ（絶対パス）
MC_PROJECT_DIR =
# composeモード時: docker-compose.yml のパス（絶対パス）
MC_COMPOSE_FILE =
# composeモード時: 必要なら env ファイル（絶対パス）
MC_ENV_FILE =
# containerモード時: 操作対象コンテナ名（最重要）
MC_CONTAINER_NAME = minecraft
# containerモード時: Compose/Stack単位操作用プロジェクト名（必要時のみ）
MC_COMPOSE_PROJECT =

# --------------------
# localモード設定
# --------------------
# OS種別（windows / linux）
MC_LOCAL_PLATFORM = linux
# Windows: 起動コマンド
MC_WINDOWS_START_COMMAND =
# Windows: 停止コマンド
MC_WINDOWS_STOP_COMMAND =
# Windows: 状態確認コマンド（終了コード0で稼働扱い）
MC_WINDOWS_STATUS_COMMAND =
# Linux: 起動コマンド
MC_LINUX_START_COMMAND =
# Linux: 停止コマンド
MC_LINUX_STOP_COMMAND =
# Linux: 状態確認コマンド（終了コード0で稼働扱い）
MC_LINUX_STATUS_COMMAND =

# --------------------
# 共通実行制御
# --------------------
# /mc start/stop/status 実行時のタイムアウト（秒）
MC_TIMEOUT_SECONDS = 60
# /mc コマンドを許可するユーザーID（カンマ区切り）
MC_ALLOWED_USER_IDS =
# /mc コマンドを許可するロールID（カンマ区切り）
MC_ALLOWED_ROLE_IDS =

# ============================================================
# 5) ログ設定
# ============================================================
[logging]
# ログレベル（例: INFO / DEBUG）
LEVEL = INFO
