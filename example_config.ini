# Discord Botの設定値をまとめたセクション
[discord]
# Botのアクセストークンを記載してください
TOKEN = Your Discord Bot Token Here
# サーバー状況メッセージを表示するテキストチャンネルIDを記載してください
STATUS_CHANNEL_ID = 000000000000000000
# エラー通知を受け取るチャンネルIDを記載してください
ERROR_CHANNEL_ID = 000000000000000000
# サーバー操作コマンドを実行できる管理者ロールIDを記載してください
ADMIN_ROLE_ID = 000000000000000000

# Minecraftサーバーの接続設定をまとめたセクション
[server]
# RCON接続に使用するホスト名を記載してください
RCON_HOST = localhost
# RCONポート番号を記載してください
RCON_PORT = 25575
# RCONパスワードを記載してください
RCON_PASSWORD = password
# サーバー状態を更新する間隔（秒）を指定してください
STATUS_INTERVAL = 30
# 無人時の自動停止機能を有効化するか指定してください（True/False）
AUTO_STOP_ENABLED = False
# 無人になってから自動停止するまでの時間（時間）を指定してください（既定:48）
AUTO_STOP_HOURS = 48

# サーバー制御に利用する外部コマンドの設定をまとめたセクション
[commands]
# サーバーを起動するコマンドまたはスクリプトを指定してください（サーバーのrun.batへの絶対パスを推奨）
START_COMMAND = C:\\MinecraftServer\\run.bat
# サーバー停止はRCON経由で実行されるため、外部停止コマンドの設定は不要です
# サーバーを再起動するコマンドまたはスクリプトを指定してください（未設定の場合は停止→起動を順に実行します）
RESTART_COMMAND =
# 外部コマンドのタイムアウト秒数を指定してください
COMMAND_TIMEOUT = 60
# サーバー操作完了を確認する再試行回数を指定してください
OPERATION_RETRY_ATTEMPTS = 3
# 各再試行の待機秒数を指定してください
OPERATION_RETRY_INTERVAL = 10

# Docker経由のMinecraftサーバー制御設定をまとめたセクション
[minecraft_control]
# 上位制御モードを指定してください（docker または local）
MC_CONTROL_MODE = docker
# dockerモード時の制御モードを指定してください（compose または container）
MC_MODE = container
# composeモード時のプロジェクトディレクトリを絶対パスで指定してください
MC_PROJECT_DIR =
# composeモード時のdocker-compose.ymlを絶対パスで指定してください
MC_COMPOSE_FILE =
# composeモード時に必要ならenvファイルを絶対パスで指定してください
MC_ENV_FILE =
# containerモードで単一コンテナを操作する場合のコンテナ名を指定してください
MC_CONTAINER_NAME = minecraft
# containerモードでCompose/Stack単位を操作する場合のproject名を指定してください
MC_COMPOSE_PROJECT =
# localモードのOS種別を指定してください（windows または linux）
MC_LOCAL_PLATFORM = linux
# localモード（Windows）時の起動コマンドを指定してください
MC_WINDOWS_START_COMMAND =
# localモード（Windows）時の停止コマンドを指定してください
MC_WINDOWS_STOP_COMMAND =
# localモード（Windows）時の状態確認コマンドを指定してください（終了コード0でrunning扱い）
MC_WINDOWS_STATUS_COMMAND =
# localモード（Linux）時の起動コマンドを指定してください
MC_LINUX_START_COMMAND =
# localモード（Linux）時の停止コマンドを指定してください
MC_LINUX_STOP_COMMAND =
# localモード（Linux）時の状態確認コマンドを指定してください（終了コード0でrunning扱い）
MC_LINUX_STATUS_COMMAND =
# start/stop/status実行時のタイムアウト秒数を指定してください
MC_TIMEOUT_SECONDS = 60
# /mcコマンドを許可するユーザーIDをカンマ区切りで指定してください
MC_ALLOWED_USER_IDS =
# /mcコマンドを許可するロールIDをカンマ区切りで指定してください
MC_ALLOWED_ROLE_IDS =


# ログ出力設定をまとめたセクション
[logging]
# Pythonのloggingモジュールに適用するログレベルを記載してください（例: INFO, DEBUG）
LEVEL = INFO
