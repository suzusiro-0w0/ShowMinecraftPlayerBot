# ローカル環境でShowMinecraftPlayerBotを運用するためのCompose定義
services:
  show-minecraft-player-bot:
    # ローカルのDockerfileを使って毎回確実にビルドする
    build: .
    # コンテナ識別を容易にするため固定名を付与する
    container_name: show-minecraft-player-bot
    # Bot実行時の作業ディレクトリを固定する
    working_dir: /app
    # エントリポイントはPythonモジュール実行に固定する
    command: ["python", "-m", "bot.main"]
    volumes:
      # 機密情報を含む本番設定はホスト側config.iniを読み取り専用でマウントする
      - /opt/showmc/config.ini:/app/config.ini:ro
      # /mc のdocker制御に必須となるDockerソケットをマウントする
      - /var/run/docker.sock:/var/run/docker.sock:rw
    # 手動停止まで自動再起動する
    restart: unless-stopped
